            title: "Не рискуйте жизнью и здоровьем"
            description: "Никакие баллы не стоят вашего благополучия"
      meaning:
        title: "О смысле взаимопомощи"
        paragraph_1: "В наше время многие спешат опередить друг друга в мирских делах — новая машина, модный смартфон, ремонт в квартире. Мы откладываем добрые дела «на потом»: в детстве — учёба, в молодости — развлечения, во взрослой жизни — карьера и семья, а благотворительность — когда-нибудь в старости."
        paragraph_2: "Но в старости часто не остаётся ни сил, ни здоровья, ни возможностей. Всевышний призывает нас соревноваться не в накоплении мирского, а в благих делах."
