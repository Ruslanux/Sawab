            description: "Всегда информируйте родственников или друзей о том, куда направляетесь и с кем встречаетесь"
          rule_2:
            title: "Встречайтесь в общественных местах"
            description: "Для первой встречи выбирайте людные места"
          rule_3:
            title: "Доверяйте интуиции"
            description: "Если что-то кажется подозрительным, откажитесь от встречи"
          rule_4:
            title: "Не передавайте личные данные"
            description: "Номера банковских карт, паспортные данные, коды из SMS"
          rule_5:
            title: "Оценивайте риски объективно"
            description: "Не все люди действуют с благими намерениями. Будьте бдительны"
